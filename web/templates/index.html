<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型集成平台 - 主页</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="active">主页</a>
        <a href="/text">文本对话</a>
        <a href="/textaudio">文本语音互转</a>
        <a href="/textimage">文本图像互转</a>
    </nav>

    <main class="home-content">
        <h1>欢迎使用AI模型集成平台</h1>
        <div class="model-cards">
            <div class="card">
                <h2>文本对话</h2>
                <p>使用GLM-4.7模型进行智能对话</p>
                <a href="/text" class="btn">进入</a>
            </div>
            <div class="card">
                <h2>文本语音互转</h2>
                <p>文本转语音（Qwen3-TTS）和语音转文本（Voxtral）</p>
                <a href="/textaudio" class="btn">进入</a>
            </div>
            <div class="card">
                <h2>文本图像互转</h2>
                <p>文本生成图像（MLX）和图像识别（Qwen3-VL）</p>
                <a href="/textimage" class="btn">进入</a>
            </div>
        </div>
    </main>
</body>
</html>
